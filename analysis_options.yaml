include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    todo: ignore
  exclude:
    # Generated build outputs (e.g. a static-site build tree) that are
    # .gitignored but may exist locally after a build. CI never sees these
    # (fresh checkout); excluding them keeps local `dart analyze` clean.
    - '**/build/**'
