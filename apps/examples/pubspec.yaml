name: restage_example
description: Minimal example app demonstrating the Restage Flutter SDK.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  restage:
    path: ../../packages/restage
  # First-party paywall widgets (Package, RestagePager,
  # ExpressCheckoutButton) used by the gallery paywalls.
  restage_material:
    path: ../../packages/restage_material
  # Used directly by the single-select device-smoke demo (RestageSelectionOption).
  restage_core:
    path: ../../packages/restage_core
  permission_handler: ^12.0.3
  # Used directly by the generated `lib/user_catalog.g.dart`.
  rfw_catalog_schema:
    path: ../../packages/rfw_catalog_schema
  # Used by `main_server_onboarding_demo.dart` (the local server-delivery demo)
  # to package a flow as a surface document and serve it from an in-app fake.
  restage_shared:
    path: ../../packages/restage_shared
  http: ^1.2.0

dev_dependencies:
  build_runner: ">=2.4.0 <3.0.0"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  restage_codegen:
    path: ../../packages/restage_codegen
  # Patrol drives the example's integration / visual tests. The gallery is a
  # web Flutter target, so they run via `patrol test --device chrome` over the
  # integration test in `integration_test/`.
  patrol: ^4.5.0
  # rfw is only needed by tool/build_paywall.dart (the .rfwtxt → .rfw
  # precompiler that runs on the standalone Dart VM). The runtime code
  # depends on rfw transitively through restage.
  rfw: ^1.1.3
  watcher: ^1.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/paywalls/
    - assets/onboarding/screens/
    - assets/onboarding/flows/

patrol:
  app_name: Restage Examples
  # Web target — Android / iOS / macOS blocks intentionally omitted. Tests run
  # via `patrol test --device chrome` and live in `integration_test/`, suffixed
  # `_patrol_test.dart` so the `patrol test` and `flutter test` invocations
  # stay unambiguous.
  test_directory: integration_test
