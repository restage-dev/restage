name: restage_a2ui_example
description: >-
  End-to-end example: annotate Flutter widgets with @RestageWidget, run
  build_runner, and render the generated A2UI catalog with genui.
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.35.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # The genui runtime the generated catalog targets.
  genui: ^0.9.2
  # The generated catalog's data schemas are built with json_schema_builder.
  json_schema_builder: ^0.1.3
  # The app-side pre-render check + the capability sidecar.
  restage_a2ui:
    path: ../
  # The @RestageWidget / @RestageProperty / @RestageLibrary annotations.
  rfw_catalog_schema:
    path: ../../rfw_catalog_schema

dev_dependencies:
  # The build-time toolchain that emits the A2UI catalog from the annotations.
  restage_codegen:
    path: ../../restage_codegen
  build_runner: ">=2.4.0 <3.0.0"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
