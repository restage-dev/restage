name: restage_a2ui
description: >-
  Fail-closed pre-render capability checks and the Restage capability sidecar
  for apps rendering cached A2UI (Google genui) surfaces.
version: 0.1.1
repository: https://github.com/restage-dev/restage
homepage: https://restage.dev
issue_tracker: https://github.com/restage-dev/restage/issues
topics:
  - server-driven-ui
  - remote-ui
  - flutter
environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.35.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  restage_shared:
    path: ../restage_shared
  genui: ^0.9.2
  json_schema_builder: ^0.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
