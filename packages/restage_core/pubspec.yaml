name: restage_core
description: >-
  Cross-platform widget primitives (Container, Column, Row, Text, Image, and
  more): a curated Remote Flutter Widget (RFW) catalog for server-driven Flutter
  UI. Widget metadata lives in lib/registry.dart and is consumed by the editor,
  the code generator, and the SDK runtime.
version: 1.0.0
repository: https://github.com/restage-dev/restage
homepage: https://restage.dev
issue_tracker: https://github.com/restage-dev/restage/issues
topics:
  - server-driven-ui
  - remote-ui
  - flutter
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  restage_shared:
    path: ../restage_shared
  rfw_catalog_schema:
    path: ../rfw_catalog_schema
  rfw: ^1.1.3

dev_dependencies:
  build_runner: ">=2.4.0 <3.0.0"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
