name: restage_material
description: >-
  Material Design widgets — a curated Remote Flutter Widgets (RFW) catalog for
  building server-driven Flutter UI that renders as real Flutter widgets.
version: 1.0.1
repository: https://github.com/restage-dev/restage
homepage: https://restage.dev
issue_tracker: https://github.com/restage-dev/restage/issues
topics:
  - server-driven-ui
  - remote-ui
  - flutter
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  restage_core:
    path: ../restage_core
  restage_shared:
    path: ../restage_shared
  rfw_catalog_schema:
    path: ../rfw_catalog_schema
  rfw: ^1.1.3

dev_dependencies:
  build_runner: ">=2.4.0 <3.0.0"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
