name: restage_shared
description: >-
  Pure-Dart Remote Flutter Widget (RFW) catalog format, schemas, validation, and
  shared value types used across the Restage packages.
version: 1.0.1
repository: https://github.com/restage-dev/restage
homepage: https://restage.dev
issue_tracker: https://github.com/restage-dev/restage/issues
topics:
  - server-driven-ui
  - remote-ui
  - flutter
environment:
  sdk: ^3.5.0

resolution: workspace

dependencies:
  crypto: ^3.0.0
  meta: ^1.16.0
  rfw_catalog_schema:
    path: ../rfw_catalog_schema

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
