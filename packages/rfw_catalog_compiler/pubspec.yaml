name: rfw_catalog_compiler
description: >-
  Analyzer-backed compiler pipeline for producing Remote Flutter Widget catalog
  IR, allocating stable wire IDs, and lowering to the public catalog schema.
version: 1.0.1
repository: https://github.com/restage-dev/restage
homepage: https://restage.dev
issue_tracker: https://github.com/restage-dev/restage/issues
topics:
  - server-driven-ui
  - remote-ui
  - flutter
# Public-bound from day one. publish_to is omitted (defaults to pub.dev);
# actual publication is deferred until the internal architecture stabilizes.

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  # analyzer floor 10.0.0 is a verified-compiling lower bound — earlier majors
  # lack element-model APIs this package relies on (e.g. FormalParameterElement),
  # so a downgrade below it fails to compile. The <15.0.0 ceiling admits the
  # latest stable analyzer (currently 14.x).
  analyzer: ">=10.0.0 <15.0.0"
  build: ">=2.4.0 <5.0.0"
  meta: ^1.16.0
  rfw_catalog_schema: ^1.0.0

dev_dependencies:
  build_test: ">=2.2.0 <4.0.0"
  mocktail: ^1.0.5
  test: ^1.25.0
